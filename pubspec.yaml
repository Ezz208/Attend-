name: attendance_app
description: Employee Attendance Management App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.6
  flutter_animate: ^4.3.0
  google_fonts: ^6.1.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # GPS & Location
  geolocator: ^11.0.0
  geocoding: ^3.0.0
  
  # Date & Time
  intl: ^0.19.0
  
  # Icons
  font_awesome_flutter: ^10.6.0
  
  # UUID
  uuid: ^4.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
